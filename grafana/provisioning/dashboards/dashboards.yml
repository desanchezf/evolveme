# Carga dashboards al arrancar Grafana.
apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: Evolveme
    folderUid: evolveme
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/default
