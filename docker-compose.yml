services:
  redis:
    image: redis:7
    container_name: evolveme-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  postgres:
    image: postgres:16
    container_name: evolveme-postgres
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "django_db"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d django_db"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    container_name: evolveme-ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    container_name: evolveme-backend
    build:
      context: .
      dockerfile: Dockerfile
    command: sh entrypoint.sh
    volumes:
      - .:/code
    ports:
      - "8001:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=Local
      - DJANGO_SETTINGS_MODULE=project.settings
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/django_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=django_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: evolveme-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    depends_on:
      - backend
      - redis

  grafana:
    image: grafana/grafana:11.3.0
    container_name: evolveme-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # celery:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   command: celery -A project worker -l info
  #   volumes:
  #     - .:/code
  #   environment:
  #     - DEBUG=1
  #     - DJANGO_SETTINGS_MODULE=project.settings
