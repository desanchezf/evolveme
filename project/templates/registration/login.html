{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — EvolveMe</title>

  <!-- Bootstrap 4 (misma versión que AdminLTE/Jazzmin) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <!-- Font Awesome 5 (iconos del admin) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">

  <style>
    /* ── Paleta del admin ─────────────────────────────────────────── */
    :root {
      --proj-primary:        #3d4252;
      --proj-primary-hover:  #50566a;
      --proj-primary-active: #2e333f;
    }

    /* ── Fondo con imagen de fondo (igual que body.login-page del admin) ── */
    html, body {
      height: 100%;
    }
    body {
      background-color: #2c2c2c;
      background-image: url("{% static 'background.png' %}");
      background-repeat: repeat;
      background-size: auto;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Caja de login ────────────────────────────────────────────── */
    .login-box {
      width: 360px;
      position: relative;
    }

    /* Logo flotante encima del card */
    .login-logo {
      position: absolute;
      top: -36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }
    .login-logo img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 50%;
      background: #fff;
      padding: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }

    /* Card blanco (igual que .login-box .card del admin) */
    .login-box .card {
      border-radius: 29px;
      overflow: hidden;
      padding-top: 36px;
      box-shadow: 0 0 400px 100px rgba(0,0,0,.75);
      border: none;
    }

    .login-card-body {
      padding: 1.5rem 2rem 2rem;
    }

    /* Título y subtítulo */
    .login-box-msg {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 600;
      color: #343a40;
      margin-bottom: 2px;
    }
    .login-box-sub {
      text-align: center;
      font-size: 0.85rem;
      color: #6c757d;
      margin-bottom: 1.25rem;
    }

    /* Inputs estilo AdminLTE */
    .input-group-text {
      background-color: #fff;
      border-left: none;
      color: #6c757d;
    }
    .form-control:focus {
      border-color: var(--proj-primary);
      box-shadow: 0 0 0 .15rem rgba(61,66,82,.2);
    }
    .form-control:focus + .input-group-append .input-group-text {
      border-color: var(--proj-primary);
    }

    /* Botón primario */
    .btn-primary {
      background-color: var(--proj-primary) !important;
      border-color: var(--proj-primary-active) !important;
      border-radius: 8px !important;
      font-weight: 600;
      letter-spacing: .03em;
    }
    .btn-primary:hover, .btn-primary:focus {
      background-color: var(--proj-primary-hover) !important;
      border-color: var(--proj-primary) !important;
    }
    .btn-primary:active {
      background-color: var(--proj-primary-active) !important;
    }

    /* Error */
    .login-error {
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <!-- Logo flotante sobre el card -->
    <div class="login-logo">
      <img src="{% static 'ico_dark.png' %}" alt="EvolveMe">
    </div>

    <div class="card">
      <div class="login-card-body">
        <p class="login-box-msg">EvolveMe</p>
        <p class="login-box-sub">Inicia sesión para continuar</p>

        {% if form.errors %}
        <div class="alert alert-danger alert-dismissible login-error">
          <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
          <i class="fas fa-exclamation-circle mr-1"></i>
          Usuario o contraseña incorrectos. Inténtalo de nuevo.
        </div>
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">

          <!-- Usuario -->
          <div class="input-group mb-3">
            <input type="text"
                   id="id_username" name="username"
                   class="form-control"
                   placeholder="Usuario"
                   autocomplete="username" autofocus
                   value="{{ form.username.value|default:'' }}">
            <div class="input-group-append">
              <div class="input-group-text"><i class="fas fa-user"></i></div>
            </div>
          </div>

          <!-- Contraseña -->
          <div class="input-group mb-3">
            <input type="password"
                   id="id_password" name="password"
                   class="form-control"
                   placeholder="Contraseña"
                   autocomplete="current-password">
            <div class="input-group-append">
              <div class="input-group-text"><i class="fas fa-lock"></i></div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block mt-1">
            <i class="fas fa-sign-in-alt mr-1"></i> Entrar
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
